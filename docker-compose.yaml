services:
  omnivoice-api:
    build: ./src/all-projects/project-voice-cloning/server
    container_name: omnivoice-api
    ports:
      - "5000:5000"
    volumes:
      - ./src/all-projects/project-voice-cloning/server:/app
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=0
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN}
    command: python app.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  portfolio-website:
    build: .
    container_name: portfolio-website
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - omnivoice-api